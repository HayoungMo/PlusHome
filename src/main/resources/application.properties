spring.application.name=PlusHome

#Server 
server.port=8080

# Oracle DataSource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=plushome
spring.datasource.password=a123

#MyBatis
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.spring.home.dto
mybatis.configuration.map-underscore-to-camel-case=true

#Logging
logging.level.com.spring.home.mapper=DEBUG

#Profile: secret 파일 함께 읽기
spring.profiles.include=secret